<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claude Spending — split with Guy</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Heebo:wght@400;700;900&display=swap');
  :root {
    --ido: #FF6B9D;
    --ido-light: #FFE0EE;
    --guy: #6B9DFF;
    --guy-light: #E0EEFF;
    --bg: #FFF9F0;
    --text: #2D2640;
    --gray: #9E9BAD;
    --card: #FFFFFF;
    --shadow: 0 8px 32px rgba(45,38,64,0.10);
    --radius: 24px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Heebo', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding-bottom: 40px; }

  .header { background: linear-gradient(135deg, #FF6B9D 0%, #6B9DFF 100%); padding: 28px 20px 22px; text-align: center; position: relative; overflow: hidden; }
  .header::before { content: ''; position: absolute; top: -40px; right: -40px; width: 160px; height: 160px; border-radius: 50%; background: rgba(255,255,255,0.12); }
  .header::after  { content: ''; position: absolute; bottom: -60px; left: -30px; width: 200px; height: 200px; border-radius: 50%; background: rgba(255,255,255,0.08); }
  .header .eyebrow { font-size: 13px; color: #fff; letter-spacing: 2px; font-weight: 700; text-transform: uppercase; position: relative; z-index: 1; margin-bottom: 6px; }
  .header h1 { font-weight: 900; font-size: 26px; color: #fff; position: relative; z-index: 1; text-shadow: 0 2px 8px rgba(0,0,0,0.15); line-height: 1.2; }
  .header .subtitle { color: rgba(255,255,255,0.92); font-size: 14px; margin-top: 6px; position: relative; z-index: 1; }
  .update-btn { position: relative; z-index: 1; margin-top: 14px; background: rgba(255,255,255,0.22); color: #fff; border: none; border-radius: 20px; padding: 9px 18px; font-family: 'Heebo', sans-serif; font-weight: 700; font-size: 14px; cursor: pointer; transition: all 0.2s; }
  .update-btn:hover { background: rgba(255,255,255,0.32); }
  .update-btn:active { transform: scale(0.96); }
  .update-btn:disabled { opacity: 0.6; cursor: default; }

  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px); background: #2D2640; color: #fff; padding: 12px 22px; border-radius: 20px; font-size: 14px; z-index: 200; transition: transform 0.4s cubic-bezier(.34,1.56,.64,1); white-space: nowrap; max-width: 90vw; overflow: hidden; text-overflow: ellipsis; }
  .toast.show { transform: translateX(-50%) translateY(0); }

  .content { padding: 16px; max-width: 560px; margin: 0 auto; }

  /* Summary card */
  .summary { background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow); padding: 22px 20px; margin-bottom: 18px; }
  .total-row { text-align: center; }
  .total-label { font-size: 13px; color: var(--gray); }
  .total-amount { font-weight: 900; font-size: 40px; line-height: 1.1; margin-top: 2px; }

  /* Receipts */
  .section-title { font-size: 13px; font-weight: 700; color: var(--gray); text-transform: uppercase; letter-spacing: 1px; margin: 6px 4px 10px; }
  .receipt { background: var(--card); border-radius: 18px; box-shadow: var(--shadow); padding: 14px 16px; margin-bottom: 10px; display: flex; align-items: center; gap: 12px; }
  .receipt .icon { font-size: 22px; }
  .receipt .info { flex: 1; min-width: 0; }
  .receipt .desc { font-weight: 700; font-size: 15px; }
  .receipt .meta { font-size: 12px; color: var(--gray); margin-top: 2px; }
  .receipt .money { text-align: right; white-space: nowrap; }
  .receipt .amount { font-weight: 900; font-size: 17px; }
  .receipt .half { font-size: 11px; color: var(--gray); margin-top: 2px; }

  .footer { text-align: center; padding: 16px; font-size: 11px; color: #D0CDD8; }
  .footer a { color: #B7B4C4; }
</style>
</head>
<body>

<div class="header">
  <p class="eyebrow">Claude spending 💸</p>
  <h1>Claude Spending</h1>
  <p class="subtitle">Receipts split 50/50 — Ido &amp; Guy · since Jun 7, 2026</p>
  <button class="update-btn" id="update-btn" onclick="checkEmail()">🔄 Check email for new receipts</button>
</div>

<div class="toast" id="toast"></div>

<div class="content">
  <div class="summary">
    <div class="total-row">
      <div class="total-label">Total spent on Claude</div>
      <div class="total-amount" id="total">$0.00</div>
    </div>
  </div>

  <div class="section-title" id="receipts-title">Receipts</div>
  <div id="receipts"></div>
</div>

<div class="footer">
  <span id="receipt-count"></span> · <a href="index.html">phone tracker →</a>
</div>

<script>
  // Paste the deployed Google Apps Script web-app URL here (see apps-script/Code.gs).
  // While empty, the "Check email" button explains how to set it up.
  var APPS_SCRIPT_URL = "";

  // Accounting between Ido and Guy starts on this date — earlier charges are
  // kept for record but excluded from the totals and the split.
  var ACCOUNTING_START = "2026-06-07";

  // Real Anthropic receipts pulled from idodan@gmail.com (Mar–Jun 2026).
  // Each Claude charge is split 50/50 between Ido and Guy.
  var ALL_RECEIPTS = [
    { date: "2026-06-17", amount: 15.23, desc: "Auto-recharge credits",                  receipt: "2837-4682-1304", paidBy: "Ido" },
    { date: "2026-06-17", amount: 20.00, desc: "One-time credit purchase",                receipt: "2485-3157-9637", paidBy: "Ido" },
    { date: "2026-06-13", amount: 90.54, desc: "Max plan – 5x (Jun 13–Jul 13)",           receipt: "2595-5003-9268", paidBy: "Ido" },
    { date: "2026-06-07", amount:  5.00, desc: "One-time credit purchase",                receipt: "2055-4744-5590", paidBy: "Ido" },
    { date: "2026-05-28", amount: 20.00, desc: "Claude Pro (May 28–Jun 28)",              receipt: "2727-7664-9379", paidBy: "Ido" },
    { date: "2026-04-28", amount: 89.78, desc: "Max plan – 5x (Apr 28–May 28)",           receipt: "2564-6442-9722", paidBy: "Ido" },
    { date: "2026-04-28", amount: 45.00, desc: "Prepaid extra usage, Individual plan",    receipt: "2756-8870-6252", paidBy: "Ido" },
    { date: "2026-04-13", amount: 20.00, desc: "Claude Pro (Apr 13–May 13)",              receipt: "2528-0892-2975", paidBy: "Ido" },
    { date: "2026-03-18", amount: 11.21, desc: "Auto recharge extra usage, Individual",   receipt: "2745-0946-9844", paidBy: "Ido" },
    { date: "2026-03-18", amount:  5.00, desc: "Prepaid extra usage, Individual plan",    receipt: "2834-0651-6648", paidBy: "Ido" },
    { date: "2026-03-18", amount:  5.00, desc: "Prepaid extra usage, Individual plan",    receipt: "2006-9180-0924", paidBy: "Ido" },
    { date: "2026-03-18", amount:  5.00, desc: "Prepaid extra usage, Individual plan",    receipt: "2338-3261-4685", paidBy: "Ido" },
    { date: "2026-03-13", amount: 20.00, desc: "Claude Pro (Mar 13–Apr 13)",              receipt: "2268-6793-0467", paidBy: "Ido" }
  ];

  // Only receipts on or after the accounting start date count.
  var RECEIPTS = ALL_RECEIPTS.filter(function(r) { return r.date >= ACCOUNTING_START; });

  function fmt(n) { return "$" + n.toFixed(2); }

  function fmtDate(iso) {
    var d = new Date(iso + "T00:00:00");
    return d.toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" });
  }

  function render() {
    var total = 0;
    RECEIPTS.forEach(function(r) { total += r.amount; });

    document.getElementById("total").textContent = fmt(total);

    document.getElementById("receipt-count").textContent =
      RECEIPTS.length + " receipts · " + fmt(total) + " total";
    document.getElementById("receipts-title").textContent =
      "Receipts (" + RECEIPTS.length + ")";

    var container = document.getElementById("receipts");
    container.innerHTML = RECEIPTS.map(function(r) {
      return '<div class="receipt">' +
        '<div class="icon">🧾</div>' +
        '<div class="info">' +
          '<div class="desc">' + r.desc + '</div>' +
          '<div class="meta">' + fmtDate(r.date) + ' · #' + r.receipt + '</div>' +
        '</div>' +
        '<div class="money">' +
          '<div class="amount">' + fmt(r.amount) + '</div>' +
          '<div class="half">' + fmt(r.amount / 2) + ' each</div>' +
        '</div>' +
      '</div>';
    }).join("");
  }

  render();

  // ── Toast ──
  var toastTimer;
  function showToast(msg) {
    var t = document.getElementById("toast");
    t.textContent = msg;
    t.classList.add("show");
    clearTimeout(toastTimer);
    toastTimer = setTimeout(function () { t.classList.remove("show"); }, 3800);
  }

  // ── Check email for new receipts (JSONP to the Apps Script web app) ──
  var checking = false;
  function checkEmail() {
    if (checking) return;
    var btn = document.getElementById("update-btn");

    if (!APPS_SCRIPT_URL) {
      showToast("Set APPS_SCRIPT_URL first — see apps-script/Code.gs for setup.");
      return;
    }

    checking = true;
    btn.disabled = true;
    btn.textContent = "🔄 Checking…";

    var cb = "onReceipts_" + Date.now();
    var prevCount = RECEIPTS.length;
    var done = false;

    function finish(ok, msg) {
      if (done) return;
      done = true;
      checking = false;
      btn.disabled = false;
      btn.textContent = "🔄 Check email for new receipts";
      if (msg) showToast(msg);
      try { delete window[cb]; } catch (e) { window[cb] = undefined; }
      if (script.parentNode) script.parentNode.removeChild(script);
    }

    window[cb] = function (data) {
      if (!Array.isArray(data)) { finish(false, "Unexpected response from email check."); return; }
      RECEIPTS = data.filter(function (r) { return r.date >= ACCOUNTING_START; });
      render();
      var added = RECEIPTS.length - prevCount;
      finish(true, added > 0
        ? "Added " + added + " new receipt" + (added === 1 ? "" : "s") + " ✅"
        : "Up to date — no new receipts.");
    };

    var script = document.createElement("script");
    script.src = APPS_SCRIPT_URL + (APPS_SCRIPT_URL.indexOf("?") === -1 ? "?" : "&") + "callback=" + cb;
    script.onerror = function () { finish(false, "Couldn't reach the email checker."); };
    document.body.appendChild(script);

    setTimeout(function () { finish(false, "Email check timed out — try again."); }, 20000);
  }
</script>
</body>
</html>
